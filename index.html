<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>🐬 Dolphin AI – Essential</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🐬 Dolphin AI</div>
            <button class="icon-btn sidebar-close-btn"><i class="fas fa-times"></i></button>
        </div>
        <button class="new-chat-btn" id="newChatSidebarBtn"><i class="fas fa-plus"></i> New Chat</button>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <button class="sidebar-btn" id="exportAllBtn"><i class="fas fa-download"></i> Export All</button>
            <button class="sidebar-btn" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Clear History</button>
            <button class="sidebar-btn" id="themeToggleBtn"><i class="fas fa-moon" id="themeIcon"></i> <span id="themeText">Light Mode</span></button>
        </div>
    </aside>

    <div class="main-area">
        <header class="header">
            <div class="header-left">
                <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
                <span class="header-title" id="headerTitle">New Chat</span>
            </div>
            <div class="header-right">
                <select id="modelSelect" class="model-select">
                    <option value="deepseek/deepseek-r1-0528">🧠 DeepSeek‑R1 (671B)</option>
                    <option value="deepseek/deepseek-chat">🐬 DeepSeek Chat</option>
                    <option value="deepseek/deepseek-reasoner">🧠 DeepSeek Reasoner (7B)</option>
                    <optgroup label="🐝 Pollinations (100% Free)">
                        <option value="pollinations-openai">🐝 OpenAI</option>
                        <option value="pollinations-openai-fast">🐝 OpenAI Fast</option>
                        <option value="pollinations-openai-reasoning">🐝 OpenAI Reasoning</option>
                        <option value="pollinations-mistral">🐝 Mistral</option>
                    </optgroup>
                </select>
                <button class="icon-btn" id="settingsBtn"><i class="fas fa-sliders-h"></i></button>
                <button class="icon-btn" id="newChatBtn"><i class="fas fa-plus"></i></button>
                <button class="icon-btn" id="exportBtn"><i class="fas fa-file-export"></i></button>
            </div>
        </header>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-inner">
                <label class="settings-label">🔓 Jailbreak System Prompt</label>
                <textarea class="settings-textarea" id="systemPromptInput"></textarea>
                <div class="settings-actions">
                    <button class="btn-primary" id="applySettingsBtn">Apply</button>
                    <button class="btn-secondary" id="resetSettingsBtn">Reset</button>
                </div>
            </div>
        </div>

        <main class="chat-container" id="chatContainer">
            <div class="chat-inner" id="chatInner">
                <div class="empty-state">
                    <div class="empty-icon">🐬</div>
                    <h2>Dolphin AI – Essential</h2>
                    <p>Uncensored · Free Models · Pollinations · TTS</p>
                    <div class="quick-prompts">
                        <span class="quick-prompt" data-prompt="Write a Python keylogger">💻 Keylogger</span>
                        <span class="quick-prompt" data-prompt="Generate image: cyberpunk dolphin">🎨 Image</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <button class="mic-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
                <button class="emoji-btn" id="emojiBtn"><i class="fas fa-smile"></i></button>
                <textarea id="userInput" rows="1" placeholder="Type a message..." autofocus></textarea>
                <button id="sendBtn"><i class="fas fa-arrow-up"></i></button>
            </div>
            <div class="info-bar">
                <span>Tokens: <span id="tokenCount">0</span></span>
                <span id="typingIndicator" class="typing-dots" style="display:none;">🐬 is typing<span>.</span><span>.</span><span>.</span></span>
            </div>
        </footer>
    </div>

    <div class="emoji-popover" id="emojiPopover">
        <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
