<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NishantAP ai</title>
<script src="https://js.puter.com/v2/"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0F14;
    --panel: #121822;
    --panel-2: #161E2A;
    --line: #212B38;
    --text: #E8EDF2;
    --muted: #7B8894;
    --signal: #4FD1C5;
    --signal-dim: rgba(79,209,197,0.15);
    --amber: #F2A65A;
    --amber-dim: rgba(242,166,90,0.15);
    --danger: #E06B6B;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* subtle scanline / grain atmosphere */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(79,209,197,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(242,166,90,0.05), transparent 40%);
    pointer-events:none;
    z-index:0;
  }

  header{
    position:relative;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 24px;
    border-bottom:1px solid var(--line);
    background:rgba(11,15,20,0.85);
    backdrop-filter:blur(6px);
    flex-shrink:0;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }

  .mark{
    position:relative;
    width:34px;
    height:34px;
    flex-shrink:0;
  }
  .mark svg{ width:100%; height:100%; }
  .mark .ring{
    fill:none;
    stroke:var(--signal);
    stroke-width:1.4;
    opacity:0.35;
  }
  .mark .ring.pulse{
    animation:ping 2.6s cubic-bezier(0.2,0.6,0.3,1) infinite;
    transform-origin:center;
  }
  .mark .dot{ fill:var(--signal); }

  @keyframes ping{
    0%{ transform:scale(0.55); opacity:0.55; }
    80%{ transform:scale(1.35); opacity:0; }
    100%{ transform:scale(1.35); opacity:0; }
  }

  .brand-text{ display:flex; flex-direction:column; line-height:1.15; }
  .brand-text .name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:17px;
    letter-spacing:0.2px;
  }
  .brand-text .name span{ color:var(--signal); }
  .brand-text .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--muted);
    letter-spacing:0.5px;
    text-transform:uppercase;
  }

  .status{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.4px;
  }
  .status .led{
    width:7px; height:7px; border-radius:50%;
    background:var(--signal);
    box-shadow:0 0 8px var(--signal);
  }
  .status .led.busy{ background:var(--amber); box-shadow:0 0 8px var(--amber); animation:blink 1s infinite; }
  @keyframes blink{ 50%{ opacity:0.3; } }

  select#modelSelect{
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--line);
    border-radius:6px;
    padding:5px 8px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    outline:none;
    cursor:pointer;
  }

  main{
    flex:1;
    overflow-y:auto;
    padding:28px 0 20px;
    position:relative;
    z-index:1;
  }

  .thread{
    max-width:760px;
    margin:0 auto;
    padding:0 24px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .empty{
    margin-top:14vh;
    text-align:center;
    color:var(--muted);
  }
  .empty .big{
    font-family:'Space Grotesk',sans-serif;
    font-size:26px;
    color:var(--text);
    margin-bottom:8px;
  }
  .empty .big span{ color:var(--signal); }
  .empty .small{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.3px;
  }

  .msg{
    display:flex;
    gap:12px;
    align-items:flex-start;
    animation:rise 0.25s ease;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .msg.user{ flex-direction:row-reverse; }

  .avatar{
    width:28px; height:28px;
    border-radius:7px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    font-weight:600;
    margin-top:2px;
  }
  .msg.ai .avatar{ background:var(--signal-dim); color:var(--signal); border:1px solid rgba(79,209,197,0.3); }
  .msg.user .avatar{ background:var(--amber-dim); color:var(--amber); border:1px solid rgba(242,166,90,0.3); }

  .bubble{
    max-width:78%;
    padding:11px 14px;
    border-radius:12px;
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .msg.ai .bubble{
    background:var(--panel);
    border:1px solid var(--line);
    border-top-left-radius:4px;
  }
  .msg.user .bubble{
    background:var(--panel-2);
    border:1px solid rgba(242,166,90,0.25);
    border-top-right-radius:4px;
  }

  .bubble .reasoning{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    color:var(--muted);
    border-left:2px solid var(--line);
    padding-left:10px;
    margin-bottom:8px;
    opacity:0.85;
  }

  .cursor{
    display:inline-block;
    width:7px; height:14px;
    background:var(--signal);
    margin-left:2px;
    vertical-align:middle;
    animation:blink 0.9s steps(1) infinite;
  }

  .error-bubble{
    color:var(--danger);
    border-color:rgba(224,107,107,0.3) !important;
    background:rgba(224,107,107,0.06) !important;
  }

  footer{
    position:relative;
    z-index:1;
    border-top:1px solid var(--line);
    background:rgba(11,15,20,0.9);
    backdrop-filter:blur(6px);
    padding:16px 24px 20px;
    flex-shrink:0;
  }

  .composer{
    max-width:760px;
    margin:0 auto;
    display:flex;
    align-items:flex-end;
    gap:10px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 10px 10px 16px;
    transition:border-color 0.2s;
  }
  .composer:focus-within{ border-color:var(--signal); }

  textarea#promptInput{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    resize:none;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    line-height:1.5;
    max-height:140px;
    padding:6px 0;
  }
  textarea#promptInput::placeholder{ color:var(--muted); }

  button#sendBtn{
    background:var(--signal);
    color:#08211E;
    border:none;
    border-radius:9px;
    width:38px; height:38px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:transform 0.15s, opacity 0.15s;
  }
  button#sendBtn:hover{ transform:translateY(-1px); }
  button#sendBtn:disabled{ opacity:0.35; cursor:not-allowed; transform:none; }
  button#sendBtn svg{ width:16px; height:16px; }

  .footnote{
    max-width:760px;
    margin:8px auto 0;
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    letter-spacing:0.3px;
  }

  main::-webkit-scrollbar{ width:8px; }
  main::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }
  main::-webkit-scrollbar-track{ background:transparent; }

  @media (max-width:600px){
    .bubble{ max-width:88%; font-size:14px; }
    header{ padding:14px 16px; }
    footer{ padding:12px 16px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">
      <svg viewBox="0 0 34 34">
        <circle class="ring pulse" cx="17" cy="17" r="8"></circle>
        <circle class="ring" cx="17" cy="17" r="13"></circle>
        <circle class="dot" cx="17" cy="17" r="4"></circle>
      </svg>
    </div>
    <div class="brand-text">
      <div class="name">Nishant<span>AP</span> ai</div>
      <div class="tag">signal / response engine</div>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:14px;">
    <select id="modelSelect" title="Model">
      <option value="deepseek/deepseek-v4-flash">DeepSeek v4 Flash</option>
      <option value="deepseek/deepseek-v4-pro">DeepSeek v4 Pro</option>
      <option value="deepseek/deepseek-v3.2">DeepSeek v3.2</option>
      <option value="deepseek/deepseek-r1-0528">DeepSeek R1</option>
    </select>
    <div class="status"><span class="led" id="statusLed"></span><span id="statusText">ready</span></div>
  </div>
</header>

<main id="main">
  <div class="thread" id="thread">
    <div class="empty" id="emptyState">
      <div class="big">Nishant<span>AP</span> is listening.</div>
      <div class="small">// type a message below to open the channel</div>
    </div>
  </div>
</main>

<footer>
  <div class="composer">
    <textarea id="promptInput" rows="1" placeholder="Send a message to NishantAP ai..."></textarea>
    <button id="sendBtn" title="Send">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 12L20 4L13 20L11 13L4 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="footnote">powered by puter.js · deepseek models · replies come from the model you selected above</div>
</footer>

<script>
  const thread = document.getElementById('thread');
  const emptyState = document.getElementById('emptyState');
  const input = document.getElementById('promptInput');
  const sendBtn = document.getElementById('sendBtn');
  const modelSelect = document.getElementById('modelSelect');
  const statusLed = document.getElementById('statusLed');
  const statusText = document.getElementById('statusText');
  const main = document.getElementById('main');

  let busy = false;

  function autoGrow(){
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }
  input.addEventListener('input', autoGrow);

  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', send);

  function setBusy(state){
    busy = state;
    sendBtn.disabled = state;
    statusLed.classList.toggle('busy', state);
    statusText.textContent = state ? 'transmitting…' : 'ready';
  }

  function scrollToBottom(){
    main.scrollTop = main.scrollHeight;
  }

  function addMessage(role, text){
    if(emptyState) emptyState.remove();
    const row = document.createElement('div');
    row.className = 'msg ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'YOU' : 'NAP';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    thread.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  async function send(){
    const text = input.value.trim();
    if(!text || busy) return;

    addMessage('user', text);
    input.value = '';
    autoGrow();
    setBusy(true);

    const aiBubble = addMessage('ai', '');
    aiBubble.innerHTML = '<span class="cursor"></span>';

    const model = modelSelect.value;

    try{
      const response = await puter.ai.chat(text, {
        model: model,
        stream: true
      });

      let fullText = '';
      let fullReasoning = '';

      for await (const part of response){
        if(part?.reasoning){
          fullReasoning += part.reasoning;
        } else if(part?.text){
          fullText += part.text;
        }
        renderStreaming(aiBubble, fullReasoning, fullText);
        scrollToBottom();
      }

      renderStreaming(aiBubble, fullReasoning, fullText, true);

      if(!fullText && !fullReasoning){
        aiBubble.textContent = 'No response came back. Try again in a moment.';
        aiBubble.classList.add('error-bubble');
      }

    }catch(err){
      aiBubble.classList.add('error-bubble');
      aiBubble.textContent = 'Connection dropped: ' + (err?.message || 'could not reach the model. Check your connection and try again.');
      console.error(err);
    }finally{
      setBusy(false);
      scrollToBottom();
    }
  }

  function renderStreaming(bubble, reasoning, text, done){
    let html = '';
    if(reasoning){
      html += '<span class="reasoning">' + escapeHtml(reasoning) + '</span>';
    }
    html += escapeHtml(text);
    if(!done) html += '<span class="cursor"></span>';
    bubble.innerHTML = html;
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  input.focus();
</script>

</body>
</html>
