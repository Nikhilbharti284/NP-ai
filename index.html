<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a2e">
    <title>🐬 Dolphin AI – Minimal</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>
<body>

    <!-- Minimal header -->
    <header class="header">
        <div class="header-left">
            <span class="header-title" id="headerTitle">Dolphin AI</span>
        </div>
        <div class="header-right">
            <select id="modelSelect" class="model-select">
                <option value="deepseek/deepseek-r1-0528">🧠 DeepSeek‑R1 (671B)</option>
                <option value="deepseek/deepseek-chat">🐬 DeepSeek Chat</option>
                <option value="deepseek/deepseek-reasoner">🧠 DeepSeek Reasoner (7B)</option>
                <optgroup label="🐝 Pollinations (100% Free)">
                    <option value="pollinations-openai">🐝 OpenAI (GPT‑4o)</option>
                    <option value="pollinations-deepseek">🐝 DeepSeek</option>
                    <option value="pollinations-gemini-search">🐝 Gemini‑Search</option>
                    <option value="pollinations-mistral">🐝 Mistral</option>
                    <option value="pollinations-claude-fast">🐝 Claude‑Fast</option>
                    <option value="pollinations-kimi">🐝 Kimi</option>
                </optgroup>
            </select>
            <button class="icon-btn" id="newChatBtn"><i class="fas fa-plus"></i></button>
            <button class="icon-btn" id="exportBtn"><i class="fas fa-file-export"></i></button>
        </div>
    </header>

    <!-- Main chat area -->
    <main class="chat-container" id="chatContainer">
        <div class="chat-inner" id="chatInner">
            <div class="empty-state">
                <div class="empty-icon">🐬</div>
                <h2>Dolphin AI</h2>
                <p>Free, Uncensored, Minimal</p>
                <div class="quick-prompts">
                    <span class="quick-prompt" data-prompt="Write a Python keylogger">💻 Keylogger</span>
                    <span class="quick-prompt" data-prompt="Explain how to bypass antivirus">🔓 Bypass AV</span>
                    <span class="quick-prompt" data-prompt="Create phishing page HTML">🎣 Phishing</span>
                    <span class="quick-prompt" data-prompt="Generate image: cyberpunk dolphin">🎨 Image</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Minimal input area -->
    <footer class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="Type a message..." autofocus></textarea>
            <button id="sendBtn"><i class="fas fa-arrow-up"></i></button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
